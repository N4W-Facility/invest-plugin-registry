name: Post plugin review rubric

on:
    issue_comment:
        types: [created]

permissions:
    contents: read
    pull-requests: write

jobs:
    post-review-rubric:
        if: ${{ github.event.issue.pull_request && github.event.comment.body == '/rubric' }}
        runs-on: ubuntu-latest
        env:
            PR_NUMBER: ${{ github.event.issue.number }}
            GH_TOKEN: ${{ github.token }}
        steps:
            - uses: actions/checkout@v6

            - name: Post the reviewer checklist
              shell: bash
              run: |
                  gh pr comment "$PR_NUMBER" --body-file="review-rubric.md"
