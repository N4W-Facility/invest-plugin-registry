name: "Write PR comment with validation results"

on:
    workflow_run:
        workflows: ["Validate new plugin"]
        types: [completed]

jobs:
    write-pr-comment-with-validation-results:
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ github.token }}
        steps:
            - name: Fetch file
              uses: actions/download-artifact@v8
              with:
                  path: pr-data
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ github.event.workflow_run.id }}

            - name: Print file contents
              run: |
                  set -ex
                  find .
                  PR_NUM=$(cat pr-data/pr-num.txt)
                  PR_AUTHOR=$(cat pr-data/pr-author.txt)
                  VALIDATION_RESULTS=pr-data/validation-results.md

                  # Append the PR author to the file.
                  # Using printf for compatibility; part of posix standard
                  # where echo is not.
                  printf "\n\nFYI @${PR_AUTHOR}\n" >> "$VALIDATION_RESULTS"

                  # debugging
                  cat "$VALIDATION_RESULTS"

                  # Write the validation results to the PR
                  gh pr comment \
                        "$PR_NUM" \
                        --body-file "$VALIDATION_RESULTS" \
                        --repo ${{ github.repository }}

                  VALIDATION_STATUS=$(cat pr-data/validation-status.txt)
                  REVIEWER_POOL="@natcap/plugin-reviewers"
                  if [[ "$VALIDATION_STATUS" = "passed" ]]
                  then
                      gh pr edit \
                        "$PR_NUM" \
                        --repo ${{ github.repository }} \
                        --add-reviewer "$REVIEWER_POOL" \
                        --add-assignee "$REVIEWER_POOL"
                  fi
