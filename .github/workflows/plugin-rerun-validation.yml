name: "Rerun validation"

on:
    issue_comment:
        types: [created]

permissions:
    contents: read
    pull-requests: write

jobs:
    plugin-rerun-validation:
        if: ${{ github.event.issue.pull_request && github.event.comment.body == '/run-validation' }}
        runs-on: ubuntu-latest
        env:
            PR_NUMBER: ${{ github.event.issue.number }}
            GH_TOKEN: ${{ secrets.PLUGIN_PR_WORKFLOW }}
            GH_REPO: ${{ github.repository }}
        steps:
            - name: Close PR
              run: |
                  gh pr close "$PR_NUMBER"

            - name: Re-open PR
              run: |
                  gh pr reopen "$PR_NUMBER"
