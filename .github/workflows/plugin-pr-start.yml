name: Start plugin contribution PR

on:
    pull_request:
        types: [opened]
        paths:
            - 'plugins.json'

permissions:
    contents: read
    pull-requests: write

jobs:
    start-plugin-contrib-pr:
        runs-on: ubuntu-latest
        env:
            PR_NUMBER: ${{ github.event.number }}
            GH_TOKEN: ${{ github.token }}
        steps:
            - uses: actions/checkout@v4

            - name: Post the reviewer checklist
              shell: bash
              run: |
                  gh pr comment "$PR_NUMBER" --body-file="review-rubric.md"
