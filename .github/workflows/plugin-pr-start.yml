name: Start plugin contribution PR

on:
    pull_request:
        types: [opened]
        paths:
            - 'plugins.json'

permissions:
    contents: read
    pull-requests: write

jobs:
    start-plugin-contrib-pr:
        runs-on: ubuntu-latest
        env:
            PR_NUMBER: ${{ github.event.number }}
            REPO: ${{ github.repository }}
            GH_TOKEN: ${{ github.token }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  cache: "pip"

            - run: pip install requests validate_pyproject

            - name: Post the reviewer checklist
              shell: bash
              run: |
                  gh pr comment "$PR_NUMBER" --body-file="review-rubric.md"

            - name: Extract the new plugin data and lint it
              shell: bash
              run: |
                  set -e  # fail script on first command failure.

                  # Extract the new plugin information from plugins.json
                  NEW_PLUGIN_DATA=new_plugin.json
                  python extract-modified-json.py \
                    plugins.json \
                    main \
                    "$NEW_PLUGIN_DATA"

                  # clone the new repo
                  REPO_URL=$(cat "$NEW_PLUGIN_DATA" | jq --raw-output .repo_url)
                  LOCAL_REPO_DIR=repo
                  git clone "$REPO_URL" "$LOCAL_REPO_DIR"

                  # Lint things
                  LINT_RESULTS_FILE=lint_results.txt
                  python scripts/lint-metadata.py \
                    "${LOCAL_REPO_DIR}/pyproject.toml" \
                    "plugins.json" \
                    --target-file="$LINT_RESULTS_FILE"

                  # Post results to the PR for review
                  gh pr comment "$PR_NUMBER" --body-file="$LINT_RESULTS_FILE"
